      <figcaption>Turnover is plotted as raw year-on-year change except 2021, where the break-adjusted +9.7% removes the financial-sector reclassification. The large divergences cluster in price shocks: 2009 oil/trade and 2022 energy. In 2020, a real activity shock with quieter prices, turnover and GDP move much closer together. Source: Destatis 73311-0001 and FRED NGDPSAXDCDEQ.</figcaption>
